name: Desktop bundles

on:
  pull_request:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: desktop-bundles-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test desktop and shared code
    # Fork pull requests keep a visible skipped record but never receive a runner.
    if: >-
      github.event_name != 'pull_request' ||
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: 22.13.0
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2

      - run: npm ci
      - run: npm run lint
      - run: npm test
      - run: npx playwright install chrome
      - run: npm run test:ui
      - run: cargo fmt --all --check
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo test --workspace

  bundle:
    name: Bundle ${{ matrix.label }}
    if: >-
      github.event_name != 'pull_request' ||
      github.event.pull_request.head.repo.full_name == github.repository
    needs: test
    environment: ${{ startsWith(github.ref, 'refs/tags/v') && 'signing' || '' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: Windows
            os: windows-latest
            bundles: msi,nsis
            arch: x64
          - label: Linux
            os: ubuntu-22.04
            bundles: appimage
            arch: x86_64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: 22.13.0
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install Linux bundle dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libxdo-dev \
            libssl-dev \
            patchelf

      - run: npm ci

      - name: Read app version
        shell: bash
        run: |
          version=$(node -p 'require("./src-tauri/tauri.conf.json").version')
          printf 'APP_VERSION=%s\n' "$version" >> "$GITHUB_ENV"

      - name: Check tag matches app version
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          if [[ "$GITHUB_REF_NAME" != "v$APP_VERSION" ]]; then
            echo "::error::Tag $GITHUB_REF_NAME does not match app version $APP_VERSION."
            exit 1
          fi

      - name: Write updater build config
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          TOPOSAIC_UPDATER_PUBLIC_KEY: ${{ secrets.TAURI_UPDATER_PUBLIC_KEY }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        shell: bash
        run: |
          set -euo pipefail
          test -n "$TAURI_SIGNING_PRIVATE_KEY"
          node scripts/write-updater-config.mjs \
            "$RUNNER_TEMP/toposaic-updater.json"

      - name: Build unsigned bundle
        if: "!startsWith(github.ref, 'refs/tags/v')"
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tauriScript: npm run tauri
          args: --bundles ${{ matrix.bundles }}
          uploadWorkflowArtifacts: false

      - name: Build signed update bundle
        if: startsWith(github.ref, 'refs/tags/v')
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tauriScript: npm run tauri
          args: >-
            --bundles ${{ matrix.bundles }}
            --config ${{ runner.temp }}/toposaic-updater.json
          uploadWorkflowArtifacts: false

      - name: Verify Windows executable
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $installation = & $vswhere -latest -products * `
            -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 `
            -property installationPath
          if (-not $installation) {
            throw "Could not find the Visual C++ build tools."
          }

          $dumpbin = Get-ChildItem "$installation\VC\Tools\MSVC" `
            -Filter dumpbin.exe -Recurse |
            Where-Object FullName -Match 'Hostx64\\x64\\dumpbin\.exe$' |
            Sort-Object FullName |
            Select-Object -Last 1
          if (-not $dumpbin) {
            throw "Could not find dumpbin.exe."
          }

          $imports = & $dumpbin.FullName /DEPENDENTS `
            "target\release\toposaic-desktop.exe" 2>&1 | Out-String
          if ($LASTEXITCODE -ne 0) {
            throw "dumpbin could not inspect the Windows executable."
          }
          $imports
          if ($imports -Match '(?i)(VCRUNTIME|MSVCP|CONCRT).*\.dll') {
            throw "The Windows executable needs a Visual C++ Redistributable runtime."
          }

          $headers = & $dumpbin.FullName /HEADERS `
            "target\release\toposaic-desktop.exe" 2>&1 | Out-String
          if ($LASTEXITCODE -ne 0) {
            throw "dumpbin could not inspect the Windows executable headers."
          }
          $subsystem = [regex]::Match(
            $headers,
            '(?im)^\s*[0-9A-F.]+\s+subsystem\s+\((?<name>[^)]+)\)\s*$'
          )
          if (-not $subsystem.Success) {
            throw "Could not read the Windows executable subsystem."
          }
          $subsystem.Value
          if ($subsystem.Groups['name'].Value -ne 'Windows GUI') {
            throw "The Windows executable would open a console window."
          }

      - name: Stage Windows files
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $msi = @(Get-ChildItem "target\release\bundle\msi" -Filter *.msi)
          $exe = @(Get-ChildItem "target\release\bundle\nsis" -Filter *.exe)
          if ($msi.Count -ne 1) {
            throw "Expected one MSI, found $($msi.Count)."
          }
          if ($exe.Count -ne 1) {
            throw "Expected one NSIS executable, found $($exe.Count)."
          }
          if ($env:GITHUB_REF.StartsWith("refs/tags/")) {
            $exeSig = Get-Item "$($exe[0].FullName).sig"
          }
          New-Item -ItemType Directory -Force "release-artifacts" | Out-Null
          Copy-Item $msi[0].FullName `
            "release-artifacts\TopoSaic-${env:APP_VERSION}-windows-${{ matrix.arch }}.msi"
          Copy-Item $exe[0].FullName `
            "release-artifacts\TopoSaic-${env:APP_VERSION}-windows-${{ matrix.arch }}.exe"
          if ($env:GITHUB_REF.StartsWith("refs/tags/")) {
            Copy-Item $exeSig.FullName `
              "release-artifacts\TopoSaic-${env:APP_VERSION}-windows-${{ matrix.arch }}.exe.sig"
          }

      - name: Stage Linux file
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          appimages=(target/release/bundle/appimage/*.AppImage)
          if [[ "${#appimages[@]}" -ne 1 ]]; then
            echo "::error::Expected one AppImage, found ${#appimages[@]}."
            exit 1
          fi
          mkdir -p release-artifacts
          cp "${appimages[0]}" \
            "release-artifacts/TopoSaic-${APP_VERSION}-linux-${{ matrix.arch }}.AppImage"
          chmod +x \
            "release-artifacts/TopoSaic-${APP_VERSION}-linux-${{ matrix.arch }}.AppImage"
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            test -s "${appimages[0]}.sig"
            cp "${appimages[0]}.sig" \
              "release-artifacts/TopoSaic-${APP_VERSION}-linux-${{ matrix.arch }}.AppImage.sig"
          fi

      - name: Upload Windows MSI
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v7
        with:
          name: TopoSaic-${{ env.APP_VERSION }}-windows-${{ matrix.arch }}.msi
          path: release-artifacts/*.msi
          if-no-files-found: error
          compression-level: 0

      - name: Upload Windows executable
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v7
        with:
          name: TopoSaic-${{ env.APP_VERSION }}-windows-${{ matrix.arch }}.exe
          path: release-artifacts/*.exe
          if-no-files-found: error
          compression-level: 0

      - name: Upload Linux AppImage
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v7
        with:
          name: TopoSaic-${{ env.APP_VERSION }}-linux-${{ matrix.arch }}.AppImage
          path: release-artifacts/*.AppImage
          if-no-files-found: error
          compression-level: 0

      - name: Upload Windows updater signature
        if: runner.os == 'Windows' && startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v7
        with:
          name: TopoSaic-${{ env.APP_VERSION }}-windows-${{ matrix.arch }}.exe.sig
          path: release-artifacts/*.exe.sig
          if-no-files-found: error
          compression-level: 0

      - name: Upload Linux updater signature
        if: runner.os == 'Linux' && startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v7
        with:
          name: TopoSaic-${{ env.APP_VERSION }}-linux-${{ matrix.arch }}.AppImage.sig
          path: release-artifacts/*.AppImage.sig
          if-no-files-found: error
          compression-level: 0

  bundle-macos-pr:
    name: Bundle macOS for pull request
    if: >-
      github.event_name == 'pull_request' &&
      github.event.pull_request.head.repo.full_name == github.repository
    needs: test
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: 22.13.0
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - run: npm ci

      - name: Read app version
        shell: bash
        run: |
          version=$(node -p 'require("./src-tauri/tauri.conf.json").version')
          printf 'APP_VERSION=%s\n' "$version" >> "$GITHUB_ENV"

      - name: Build ad-hoc macOS bundle
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tauriScript: npm run tauri
          args: --bundles app,dmg
          uploadWorkflowArtifacts: false

      - name: Verify and stage macOS files
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          app="target/release/bundle/macos/TopoSaic.app"
          dmgs=(target/release/bundle/dmg/*.dmg)
          test -d "$app"
          test "${#dmgs[@]}" -eq 1
          codesign --verify --deep --strict --verbose=4 "$app"
          hdiutil verify "${dmgs[0]}"
          mkdir -p release-artifacts
          ditto -c -k --sequesterRsrc --keepParent "$app" \
            "release-artifacts/TopoSaic-${APP_VERSION}-macos-aarch64.app.zip"
          cp "${dmgs[0]}" \
            "release-artifacts/TopoSaic-${APP_VERSION}-macos-aarch64.dmg"

      - name: Upload macOS app archive
        uses: actions/upload-artifact@v7
        with:
          name: TopoSaic-${{ env.APP_VERSION }}-macos-aarch64.app.zip
          path: release-artifacts/*.app.zip
          if-no-files-found: error
          compression-level: 0

      - name: Upload macOS disk image
        uses: actions/upload-artifact@v7
        with:
          name: TopoSaic-${{ env.APP_VERSION }}-macos-aarch64.dmg
          path: release-artifacts/*.dmg
          if-no-files-found: error
          compression-level: 0

  bundle-macos:
    name: Bundle signed and notarized macOS
    if: >-
      github.repository == 'theatrus/toposaic' &&
      (github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' &&
      github.actor == 'theatrus' &&
      github.ref == 'refs/heads/main'))
    needs: test
    environment: signing
    runs-on: macos-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: 22.13.0
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - run: npm ci

      - name: Read app version
        shell: bash
        run: |
          version=$(node -p 'require("./src-tauri/tauri.conf.json").version')
          printf 'APP_VERSION=%s\n' "$version" >> "$GITHUB_ENV"

      - name: Check tag matches app version
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          if [[ "$GITHUB_REF_NAME" != "v$APP_VERSION" ]]; then
            echo "::error::Tag $GITHUB_REF_NAME does not match app version $APP_VERSION."
            exit 1
          fi

      - name: Write updater build config
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          TOPOSAIC_UPDATER_PUBLIC_KEY: ${{ secrets.TAURI_UPDATER_PUBLIC_KEY }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        shell: bash
        run: |
          set -euo pipefail
          test -n "$TAURI_SIGNING_PRIVATE_KEY"
          node scripts/write-updater-config.mjs \
            "$RUNNER_TEMP/toposaic-updater.json"

      - name: Import Developer ID certificate
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_BUILD_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_BUILD_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        shell: bash
        run: |
          set -euo pipefail
          test -n "$APPLE_CERTIFICATE"
          test -n "$APPLE_CERTIFICATE_PASSWORD"
          test -n "$KEYCHAIN_PASSWORD"

          certificate_path="$RUNNER_TEMP/toposaic-certificate.p12"
          keychain_path="$RUNNER_TEMP/toposaic-signing.keychain-db"
          printf '%s' "$APPLE_CERTIFICATE" | base64 -D > "$certificate_path"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$keychain_path"
          security set-keychain-settings -lut 7200 "$keychain_path"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$keychain_path"
          security import "$certificate_path" \
            -k "$keychain_path" \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s \
            -k "$KEYCHAIN_PASSWORD" \
            "$keychain_path"
          security list-keychains -d user -s "$keychain_path"

          certificate_identity="$(
            security find-identity -v -p codesigning "$keychain_path" \
              | awk -F'"' '/Developer ID Application/ { print $2; exit }'
          )"
          test "$certificate_identity" = \
            "Developer ID Application: StackFoundry LLC (HSRHLHH333)"
          printf 'APPLE_SIGNING_IDENTITY=%s\n' "$certificate_identity" \
            >> "$GITHUB_ENV"

      - name: Install App Store Connect key
        env:
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_PRIVATE: ${{ secrets.APPLE_API_KEY_PRIVATE }}
        shell: bash
        run: |
          set -euo pipefail
          test -n "$APPLE_API_ISSUER"
          test -n "$APPLE_API_KEY"
          test -n "$APPLE_API_KEY_PRIVATE"

          key_path="$RUNNER_TEMP/AuthKey_${APPLE_API_KEY}.p8"
          printf '%s' "$APPLE_API_KEY_PRIVATE" | base64 -D > "$key_path"
          chmod 600 "$key_path"
          printf 'APPLE_API_KEY_PATH=%s\n' "$key_path" >> "$GITHUB_ENV"

      - name: Build signed and notarized macOS bundle
        if: "!startsWith(github.ref, 'refs/tags/v')"
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
        with:
          tauriScript: npm run tauri
          args: --bundles app,dmg
          uploadWorkflowArtifacts: false

      - name: Build signed and notarized macOS update bundle
        if: startsWith(github.ref, 'refs/tags/v')
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tauriScript: npm run tauri
          args: >-
            --bundles app,dmg
            --config ${{ runner.temp }}/toposaic-updater.json
          uploadWorkflowArtifacts: false

      - name: Notarize and staple disk image
        env:
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          dmgs=(target/release/bundle/dmg/*.dmg)
          test "${#dmgs[@]}" -eq 1
          xcrun notarytool submit "${dmgs[0]}" \
            --key "$APPLE_API_KEY_PATH" \
            --key-id "$APPLE_API_KEY" \
            --issuer "$APPLE_API_ISSUER" \
            --wait \
            --timeout 30m
          xcrun stapler staple "${dmgs[0]}"

      - name: Verify and stage signed macOS files
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          app="target/release/bundle/macos/TopoSaic.app"
          dmgs=(target/release/bundle/dmg/*.dmg)
          test -d "$app"
          test "${#dmgs[@]}" -eq 1

          codesign --verify --deep --strict --verbose=4 "$app"
          codesign --verify --verbose=4 "${dmgs[0]}"
          xcrun stapler validate "$app"
          xcrun stapler validate "${dmgs[0]}"
          spctl --assess --type execute --verbose=4 "$app"
          spctl --assess \
            --type open \
            --context context:primary-signature \
            --verbose=4 \
            "${dmgs[0]}"
          hdiutil verify "${dmgs[0]}"

          mkdir -p release-artifacts
          ditto -c -k --sequesterRsrc --keepParent "$app" \
            "release-artifacts/TopoSaic-${APP_VERSION}-macos-aarch64.app.zip"
          cp "${dmgs[0]}" \
            "release-artifacts/TopoSaic-${APP_VERSION}-macos-aarch64.dmg"
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            updater="target/release/bundle/macos/TopoSaic.app.tar.gz"
            test -s "$updater"
            test -s "$updater.sig"
            cp "$updater" \
              "release-artifacts/TopoSaic-${APP_VERSION}-macos-aarch64.app.tar.gz"
            cp "$updater.sig" \
              "release-artifacts/TopoSaic-${APP_VERSION}-macos-aarch64.app.tar.gz.sig"
          fi

      - name: Upload signed macOS app archive
        uses: actions/upload-artifact@v7
        with:
          name: TopoSaic-${{ env.APP_VERSION }}-macos-aarch64.app.zip
          path: release-artifacts/*.app.zip
          if-no-files-found: error
          compression-level: 0

      - name: Upload signed macOS disk image
        uses: actions/upload-artifact@v7
        with:
          name: TopoSaic-${{ env.APP_VERSION }}-macos-aarch64.dmg
          path: release-artifacts/*.dmg
          if-no-files-found: error
          compression-level: 0

      - name: Upload signed macOS updater
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v7
        with:
          name: TopoSaic-${{ env.APP_VERSION }}-macos-aarch64-updater
          path: |
            release-artifacts/*.app.tar.gz
            release-artifacts/*.app.tar.gz.sig
          if-no-files-found: error
          compression-level: 0

      - name: Remove signing material
        if: always()
        env:
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
        shell: bash
        run: |
          security delete-keychain \
            "$RUNNER_TEMP/toposaic-signing.keychain-db" || true
          rm -f "$RUNNER_TEMP/toposaic-certificate.p12"
          rm -f "$RUNNER_TEMP/AuthKey_${APPLE_API_KEY}.p8"

  release:
    name: Publish tagged release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [test, bundle, bundle-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7

      - name: Download installable files
        uses: actions/download-artifact@v8
        with:
          pattern: TopoSaic-*
          path: release-artifacts
          merge-multiple: true

      - name: Check release files
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          version="${GITHUB_REF_NAME#v}"
          required=(
            "TopoSaic-${version}-windows-x64.msi"
            "TopoSaic-${version}-windows-x64.exe"
            "TopoSaic-${version}-windows-x64.exe.sig"
            "TopoSaic-${version}-macos-aarch64.app.zip"
            "TopoSaic-${version}-macos-aarch64.dmg"
            "TopoSaic-${version}-macos-aarch64.app.tar.gz"
            "TopoSaic-${version}-macos-aarch64.app.tar.gz.sig"
            "TopoSaic-${version}-linux-x86_64.AppImage"
            "TopoSaic-${version}-linux-x86_64.AppImage.sig"
          )
          for file in "${required[@]}"; do
            if [[ ! -s "release-artifacts/$file" ]]; then
              echo "::error::Missing release file $file."
              exit 1
            fi
          done

      - name: Build release feeds
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          published_at="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          node scripts/release-feeds.mjs \
            release-artifacts \
            "$version" \
            "$GITHUB_REF_NAME" \
            "$published_at"
          node -e '
            for (const file of ["updater.json", "notice.json"]) {
              JSON.parse(require("node:fs").readFileSync(`release-artifacts/${file}`, "utf8"));
            }
          '

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          tag="$GITHUB_REF_NAME"
          files=(release-artifacts/*)
          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" "${files[@]}" --clobber
          else
            flags=(--verify-tag --generate-notes --title "TopoSaic $tag")
            if [[ "$tag" == *-* ]]; then
              flags+=(--prerelease)
            fi
            gh release create "$tag" "${files[@]}" "${flags[@]}"
          fi
